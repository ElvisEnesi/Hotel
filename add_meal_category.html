<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="testimonial">
        <div class="comments">
            <div class="testimonial_card comment_cards">
                <p>
                    "My stay at Tafari Hotel was absolutely wonderful! The staff were incredibly attentive and the room was luxurious and comfortable. 
                    I especially enjoyed the spa treatments and the delicious meals at the restaurant. I can't wait to come back!"
                </p>
                <div class="testimonial_details">
                    <h3>Management</h3>
                    <span class="date">13/03/2026</span>
                </div>
            </div>
        </div>
        <div class="review_form comment_form">
            <h3>Add meal category</h3>
            <form>
                <input type="text" name="title" placeholder="title">
                <textarea placeholder="Descriptiion"></textarea>
                <button type="submit">Submit Review</button>
            </form>
        </div>
    </section>
</body>
</html>
